<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — ShopFire</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">Shop<span>Fire</span> <span style="font-size:.7rem;color:var(--text-muted);font-family:var(--font-body)">Admin</span></a>
  <div class="nav-links">
    <a href="products.html">View Store</a>
  </div>
</nav>

<div class="page">
  <h1 class="page-title">Product Management</h1>
  <div class="admin-layout">

    <!-- Add / Edit Form -->
    <div class="admin-form-card">
      <h3 id="form-title">Add New Product</h3>
      <form id="product-form">
        <div class="form-group">
          <label>Product Name</label>
          <input type="text" name="pName" placeholder="e.g. Wireless Headphones" required/>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea name="pDesc" placeholder="Describe the product…" required></textarea>
        </div>
        <div class="form-group">
          <label>Price (₹)</label>
          <input type="number" name="pPrice" placeholder="999" min="1" required/>
        </div>
        <div class="form-group">
          <label>Stock</label>
          <input type="number" name="pStock" placeholder="50" min="0" required/>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select name="pCategory" required>
            <option value="">Select Category</option>
            <option>Electronics</option>
            <option>Clothing</option>
            <option>Books</option>
            <option>Home</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="url" name="pImage" placeholder="https://…/image.jpg"/>
        </div>
        <button type="submit" class="btn-primary btn-block">Add Product</button>
      </form>
    </div>

    <!-- Products Table -->
    <div>
      <h3 style="margin-bottom:1rem">All Products</h3>
      <div class="products-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="products-tbody">
            <tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:2rem">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<footer>© 2025 ShopFire Admin</footer>

<script type="module" src="js/admin.js"></script>
</body>
</html>
