<!DOCTYPE html>
<html>
<head>
    <title>Creative Signup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
             background: linear-gradient(-45deg, #667eea, #764ba2, #6a11cb, #2575fc);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .signup-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 15px;
            width: 380px;
            color: white;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .signup-box h2 {
            margin-bottom: 20px;
        }

        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 12px;
            cursor: pointer;
            font-size: 13px;
            color: #333;
        }

        .signup-box button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: white;
            color: #333;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .signup-box button:hover {
            background: #eee;
        }

        .login-link {
            margin-top: 15px;
            font-size: 14px;
            cursor: pointer;
        }

        .error {
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 10px;
            color: #ffdddd;
        }

        @media(max-width: 420px){
            .signup-box {
                width: 90%;
            }
        }
    </style>
</head>
<body>

<div class="signup-box">
    <h2>Create Account</h2>

    <div class="input-group">
        <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-group">
        <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
        <span class="toggle-password" onclick="togglePassword('password', this)">Show</span>
    </div>

    <div class="input-group">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
        <span class="toggle-password" onclick="togglePassword('confirmPassword', this)">Show</span>
    </div>

    <div class="error" id="errorMsg"></div>

    <button onclick="signup()">Sign Up</button>
    <a href="login.html"></a>

    <div class="login-link">
        Already have an account?
        <a href="login.html">Login</a>
    </div>
</div>

<script>

function togglePassword(id, element) {
    const field = document.getElementById(id);
    if (field.type === "password") {
        field.type = "text";
        element.textContent = "Hide";
    } else {
        field.type = "password";
        element.textContent = "Show";
    }
}

function signup() {
    const user = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;
    const confirmPass = document.getElementById("confirmPassword").value;
    const errorMsg = document.getElementById("errorMsg");

    if(user === "" || email === "" || pass === "" || confirmPass === "") {
        errorMsg.textContent = "Please fill all fields!";
        return;
    }

    if(pass.length < 6) {
        errorMsg.textContent = "Password must be at least 6 characters!";
        return;
    }

    if(pass !== confirmPass) {
        errorMsg.textContent = "Passwords do not match!";
        return;
    }

    errorMsg.textContent = "";
    alert("Signup Successful");
        window.location.href = "login.html";
}

</script>

</body>
</html>i
