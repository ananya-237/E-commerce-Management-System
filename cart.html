<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart — ShopFire</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/cart.css"/>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">Shop<span>Fire</span></a>
  <div class="nav-links">
    <a href="products.html">← Continue Shopping</a>
  </div>
  <div class="nav-actions">
    <a href="cart.html" class="cart-icon">🛒 <span id="cart-badge" style="display:none">0</span></a>
    <a href="auth.html" id="nav-auth-btn" class="btn-primary">Sign In</a>
    <button id="nav-logout-btn" class="btn-outline" style="display:none">Logout</button>
  </div>
</nav>

<div class="page">
  <h1 class="page-title">Shopping Cart</h1>
  <div class="cart-layout">
    <div id="cart-items"></div>
    <div id="cart-summary"></div>
  </div>
</div>

<footer>© 2025 ShopFire</footer>

<script type="module">
  import { renderCart, updateCartBadge } from "./js/cart.js";
  import { watchAuth, logout } from "./js/auth.js";

  updateCartBadge();
  renderCart("cart-items", "cart-summary");

  watchAuth((user) => {
    if (user) {
      document.getElementById("nav-auth-btn").style.display = "none";
      document.getElementById("nav-logout-btn").style.display = "inline-flex";
    }
  });
  document.getElementById("nav-logout-btn").addEventListener("click", logout);
</script>
</body>
</html>
