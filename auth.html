<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — ShopFire</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>
<div class="auth-page">

  <!-- Left brand panel -->
  <div class="auth-left">
    <div class="auth-brand">
      <div class="auth-brand-logo">Shop<span>Fire</span></div>
      <p class="auth-brand-tagline">Your modern shopping destination</p>
    </div>
  </div>

  <!-- Right form panel -->
  <div class="auth-right">
    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to continue shopping</p>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="register">Register</button>
      </div>

      <!-- Error display -->
      <div class="auth-error" id="auth-error"></div>

      <!-- Google Button -->
      <button class="btn-google" id="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"/>
        Continue with Google
      </button>

      <div class="divider">or</div>

      <!-- Login form -->
      <div class="form-panel active" id="panel-login">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required/>
        </div>
        <button class="btn-primary btn-block" id="btn-login">Sign In</button>
      </div>

      <!-- Register form -->
      <div class="form-panel" id="panel-register">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="John Doe" required/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min. 6 characters" required/>
        </div>
        <button class="btn-primary btn-block" id="btn-register">Create Account</button>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { loginWithEmail, loginWithGoogle, registerWithEmail, redirectIfAuth } from "./js/auth.js";

  redirectIfAuth("products.html");

  const errEl = document.getElementById("auth-error");
  function showErr(msg) { errEl.textContent = msg; errEl.classList.add("show"); }
  function hideErr() { errEl.classList.remove("show"); }

  // Tabs
  document.querySelectorAll(".auth-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".auth-tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".form-panel").forEach(p => p.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById(`panel-${tab.dataset.tab}`).classList.add("active");
      hideErr();
    });
  });

  // Google
  document.getElementById("btn-google").addEventListener("click", async () => {
    try { await loginWithGoogle(); window.location.href = "products.html"; }
    catch (e) { showErr(e.message); }
  });

  // Login
  document.getElementById("btn-login").addEventListener("click", async () => {
    hideErr();
    const email = document.getElementById("login-email").value;
    const pass = document.getElementById("login-password").value;
    try { await loginWithEmail(email, pass); window.location.href = "products.html"; }
    catch (e) { showErr(e.message); }
  });

  // Register
  document.getElementById("btn-register").addEventListener("click", async () => {
    hideErr();
    const name = document.getElementById("reg-name").value;
    const email = document.getElementById("reg-email").value;
    const pass = document.getElementById("reg-password").value;
    try { await registerWithEmail(name, email, pass); window.location.href = "products.html"; }
    catch (e) { showErr(e.message); }
  });
</script>
</body>
</html>
