<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product — ShopFire</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/products.css"/>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">Shop<span>Fire</span></a>
  <div class="nav-links">
    <a href="products.html">← Back to Products</a>
  </div>
  <div class="nav-actions">
    <a href="cart.html" class="cart-icon">🛒 <span id="cart-badge" style="display:none">0</span></a>
    <a href="auth.html" id="nav-auth-btn" class="btn-primary">Sign In</a>
    <button id="nav-logout-btn" class="btn-outline" style="display:none">Logout</button>
  </div>
</nav>

<div class="page" id="detail-page">
  <p class="loading-msg">Loading product…</p>
</div>

<footer>© 2025 ShopFire</footer>

<script type="module">
  import { fetchProduct } from "./js/products.js";
  import { addToCart, updateCartBadge } from "./js/cart.js";
  import { showToast } from "./js/products.js";
  import { watchAuth, logout } from "./js/auth.js";

  updateCartBadge();
  watchAuth((user) => {
    if (user) {
      document.getElementById("nav-auth-btn").style.display = "none";
      document.getElementById("nav-logout-btn").style.display = "inline-flex";
    }
  });
  document.getElementById("nav-logout-btn").addEventListener("click", logout);

  const id = new URLSearchParams(location.search).get("id");
  const page = document.getElementById("detail-page");

  if (!id) { page.innerHTML = `<p class="empty-msg">No product specified.</p>`; }
  else {
    const p = await fetchProduct(id);
    if (!p) { page.innerHTML = `<p class="empty-msg">Product not found.</p>`; }
    else {
      page.innerHTML = `
        <div class="product-detail">
          <div class="product-detail-img">
            <img src="${p.imageUrl || 'assets/placeholder.png'}" alt="${p.name}"/>
          </div>
          <div class="detail-info">
            <span class="detail-category">${p.category || 'General'}</span>
            <h1 class="detail-name">${p.name}</h1>
            <div class="detail-price">₹${p.price?.toLocaleString()}</div>
            <p class="detail-desc">${p.description || ''}</p>
            <p class="detail-stock ${p.stock === 0 ? 'out' : ''}">${p.stock > 0 ? `✓ In Stock (${p.stock} available)` : '✕ Out of Stock'}</p>

            <div class="qty-selector">
              <button id="qty-dec">−</button>
              <span id="qty-val">1</span>
              <button id="qty-inc">+</button>
            </div>

            <button class="btn-primary" id="btn-add-cart" ${p.stock === 0 ? 'disabled' : ''} style="font-size:1rem;padding:.8rem 2rem">
              ${p.stock === 0 ? 'Out of Stock' : '🛒 Add to Cart'}
            </button>
          </div>
        </div>`;

      let qty = 1;
      document.getElementById("qty-inc").addEventListener("click", () => { qty = Math.min(qty + 1, p.stock); document.getElementById("qty-val").textContent = qty; });
      document.getElementById("qty-dec").addEventListener("click", () => { qty = Math.max(1, qty - 1); document.getElementById("qty-val").textContent = qty; });
      document.getElementById("btn-add-cart").addEventListener("click", () => {
        addToCart(p, qty);
        updateCartBadge();
        showToast(`"${p.name}" added to cart`);
      });
    }
  }
</script>
</body>
</html>
