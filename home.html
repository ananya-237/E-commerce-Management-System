<!DOCTYPE html>
<html>
<head>
    <title>ShopEase - Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI;
        }

        body{
            background:#f5f5f5;
        }

        /* NAVBAR */
        nav{
            background:#111;
            color:white;
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            font-size:22px;
            font-weight:bold;
        }

        .menu{
            display:flex;
            gap:20px;
            align-items:center;
        }

        .menu input{
            padding:6px;
            border-radius:5px;
            border:none;
        }

        .dropdown{
            position:relative;
        }

        .dropdown-content{
            display:none;
            position:absolute;
            background:white;
            color:black;
            top:30px;
            min-width:180px;
            border-radius:6px;
            padding:10px;
        }

        .dropdown-content a{
            display:block;
            padding:8px;
            text-decoration:none;
            color:black;
        }

        .dropdown-content a:hover{
            background:#eee;
        }

        .dropdown:hover .dropdown-content{
            display:block;
        }

        .cart-count{
            background:red;
            padding:3px 8px;
            border-radius:50%;
            font-size:12px;
        }

        /* SLIDER */
        .slider{
            position:relative;
            height: 500px;
            overflow:hidden;
        }

        .slides{
            display:flex;
            width:400%;
            transition:10s;
        }

        .slides img{
            width:100%;
            height:500px;
            object-fit:cover;

        .arrows{
            position:absolute;
            top:50%;
            transform:translateY(-50%);
            font-size:40px;
            color:white;
            background:rgba(0,0,0,0.4);
            padding:10px 15px;
            cursor:pointer;
            border-radius:50%;
            user-select:none;
        }

        .left{ left:20px; }
        .right{ right:20px; }
        }

        /* PRODUCTS */
        .products{
            padding:40px;
            text-align:center;
        }

        .product-container{
            display:flex;
            gap:20px;
            justify-content:center;
            flex-wrap:wrap;
            margin-top:30px;
        }

        .card{
            background:white;
            padding:15px;
            width:220px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card img{
            width:100%;
            height:150px;
            object-fit:cover;
        }

        .card button{
            margin-top:10px;
            padding:8px;
            width:100%;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .add-cart{
            background:#111;
            color:white;
        }

        .wishlist{
            background:#ff4081;
            color:white;
        }

        footer{
            background:#111;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:40px;
        }

    </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">ShopEase</div>

    <div class="menu">

        <div class="dropdown">
            <span>Categories ▼</span>
            <div class="dropdown-content">
                <a href="#">Fashion</a>
                <a href="#">Appliances</a>
                <a href="#">Mobile & Laptop</a>
                <a href="#">Beauty & Personal Care</a>
            </div>
        </div>

        <input type="text" id="searchBox" placeholder="Search products..." onkeyup="searchProduct()">

        <div>
            🛒 Cart <span class="cart-count" id="cartCount">0</span>
        </div>

    </div>
</nav>

<!-- IMAGE SLIDER -->
<div class="slider">
    <div class="slides" id="slideContainer">
        <img src="https://img.freepik.com/free-photo/photocomposition-horizontal-shopping-banner-with-woman-big-smartphone_23-2151201773.jpg" />
        
        <img src="https://blog.magezon.com/wp-content/uploads/2020/08/fashion-banner.png" />
        
        <img src="https://mir-s3-cdn-cf.behance.net/project_modules/fs/d1fa2f93546277.5e67adbfa56c3.jpg" />

         <img src="https://mir-s3-cdn-cf.behance.net/project_modules/fs/09a675179788335.6535ea2d5e747.jpg" />
    </div>
    <button style="position:absolute; top:50%; left:10px;" onclick="prevSlide()">&#10094;</button>
    <button style="position:absolute; top:50%; right:10px;" onclick="nextSlide()">&#10095;</button>

</div>

<!-- PRODUCTS -->
<div class="products">
    <h2>Featured Products</h2>

    <div class="product-container" id="productContainer"></div>
</div>

<footer>
    © 2026 ShopEase | Help Center | Contact | About Us
</footer>

<script>

let products = [
    {name:"Smartphone", image:"https://img.freepik.com/premium-photo/realistic-white-smartphone-design-with-three-cameras_1144471-2890.jpg?w=2000"},
    {name:"Laptop", image:"https://images.gizbot.com/img/2023/05/xps13plus9320-1-1684843070.jpg"},
    {name:"Shoes", image:"https://static.nike.com/a/images/t_PDP_1280_v1/f_auto,q_auto:eco/2278ef28-bac0-4f92-ba11-ab1efd5e4586/custom-nike-dunk-high-by-you-shoes.png"},
    {name:"Makeup Kit", image:"https://m.media-amazon.com/images/I/81W7D1O013S.jpg"},
];

let cart = [];

function loadProducts(list = products){
    let container = document.getElementById("productContainer");
    container.innerHTML = "";

    list.forEach(product=>{
        container.innerHTML += `
            <div class="card">
                <img src="${product.image}">
                <h4>${product.name}</h4>
                <button class="add-cart" onclick="addToCart()">Add to Cart</button>
                <button class="wishlist" onclick="addToWishlist()">Wishlist</button>
            </div>
        `;
    });
}

function addToCart(){
    cart.push(1);
    document.getElementById("cartCount").innerText = cart.length;
}

function addToWishlist(){
    alert("Added to Wishlist ❤️");
}

function searchProduct(){
    let value = document.getElementById("searchBox").value.toLowerCase();
    let filtered = products.filter(p => p.name.toLowerCase().includes(value));
    loadProducts(filtered);
}

/* MANUAL SLIDER */

let index = 0;
const slideContainer = document.getElementById("slideContainer");
const totalSlides = slideContainer.children.length;

function nextSlide() {
    index++;
    if (index >= totalSlides) {
        index = 0;
    }
    slideContainer.style.transform = `translateX(-${index * 100}%)`;
}

function prevSlide() {
    index--;
    if (index < 0) {
        index = totalSlides - 1;
    }
    slideContainer.style.transform = `translateX(-${index * 100}%)`;
}

loadProducts();

</script>

</body>
</html>
