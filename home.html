<!DOCTYPE html>
<html>
<head>
    <title>ShopX - Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI;
        }

        body{
            background:#f5f5f5;
        }

        /* NAVBAR */
        nav{
            background:#111;
            color:white;
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            font-size:22px;
            font-weight:bold;
        }

        .menu{
            display:flex;
            gap:20px;
            align-items:center;
        }

        .menu input{
            padding:6px;
            border-radius:5px;
            border:none;
        }

        .dropdown{
            position:relative;
        }

        .dropdown-content{
            display:none;
            position:absolute;
            background:white;
            color:black;
            top:30px;
            min-width:180px;
            border-radius:6px;
            padding:10px;
        }

        .dropdown-content a{
            display:block;
            padding:8px;
            text-decoration:none;
            color:black;
        }

        .dropdown-content a:hover{
            background:#eee;
        }

        .dropdown:hover .dropdown-content{
            display:block;
        }

        .cart-count{
            background:red;
            padding:3px 8px;
            border-radius:50%;
            font-size:12px;
        }

        /* SLIDER */
        .slider{
            position:relative;
            height:300px;
            overflow:hidden;
        }

        .slides{
            display:flex;
            width:300%;
            transition:0.5s;
        }

        .slides img{
            width:100%;
            height:300px;
            object-fit:cover;
        }

        /* PRODUCTS */
        .products{
            padding:40px;
            text-align:center;
        }

        .product-container{
            display:flex;
            gap:20px;
            justify-content:center;
            flex-wrap:wrap;
            margin-top:30px;
        }

        .card{
            background:white;
            padding:15px;
            width:220px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card img{
            width:100%;
            height:150px;
            object-fit:cover;
        }

        .card button{
            margin-top:10px;
            padding:8px;
            width:100%;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .add-cart{
            background:#111;
            color:white;
        }

        .wishlist{
            background:#ff4081;
            color:white;
        }

        footer{
            background:#111;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:40px;
        }

    </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">ShopX</div>

    <div class="menu">

        <div class="dropdown">
            <span>Categories ▼</span>
            <div class="dropdown-content">
                <a href="#">Fashion</a>
                <a href="#">Appliances</a>
                <a href="#">Mobile & Laptop</a>
                <a href="#">Beauty & Personal Care</a>
            </div>
        </div>

        <input type="text" id="searchBox" placeholder="Search products..." onkeyup="searchProduct()">

        <div>
            🛒 Cart <span class="cart-count" id="cartCount">0</span>
        </div>

    </div>
</nav>

<!-- IMAGE SLIDER -->
<div class="slider">
    <div class="slides" id="slideContainer">
        <img src="https://source.unsplash.com/1200x300/?shopping" />
        <img src="https://source.unsplash.com/1200x300/?fashion" />
        <img src="https://source.unsplash.com/1200x300/?electronics" />
    </div>
</div>

<!-- PRODUCTS -->
<div class="products">
    <h2>Featured Products</h2>

    <div class="product-container" id="productContainer"></div>
</div>

<footer>
    © 2026 ShopX | Help Center | Contact | About Us
</footer>

<script>

let products = [
    {name:"Smartphone", image:"https://source.unsplash.com/300x200/?phone"},
    {name:"Laptop", image:"https://source.unsplash.com/300x200/?laptop"},
    {name:"Shoes", image:"https://source.unsplash.com/300x200/?shoes"},
    {name:"Makeup Kit", image:"https://source.unsplash.com/300x200/?cosmetics"},
];

let cart = [];

function loadProducts(list = products){
    let container = document.getElementById("productContainer");
    container.innerHTML = "";

    list.forEach(product=>{
        container.innerHTML += `
            <div class="card">
                <img src="${product.image}">
                <h4>${product.name}</h4>
                <button class="add-cart" onclick="addToCart()">Add to Cart</button>
                <button class="wishlist" onclick="addToWishlist()">Wishlist</button>
            </div>
        `;
    });
}

function addToCart(){
    cart.push(1);
    document.getElementById("cartCount").innerText = cart.length;
}

function addToWishlist(){
    alert("Added to Wishlist ❤️");
}

function searchProduct(){
    let value = document.getElementById("searchBox").value.toLowerCase();
    let filtered = products.filter(p => p.name.toLowerCase().includes(value));
    loadProducts(filtered);
}

/* AUTO SLIDER */
let index = 0;
setInterval(()=>{
    index++;
    if(index>2) index=0;
    document.getElementById("slideContainer").style.transform = 
        `translateX(-${index * 100}%)`;
},3000);

loadProducts();

</script>

</body>
</html>
