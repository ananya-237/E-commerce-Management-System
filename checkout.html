<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout — ShopFire</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/cart.css"/>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">Shop<span>Fire</span></a>
  <div class="nav-actions">
    <a href="cart.html" class="cart-icon">🛒 <span id="cart-badge" style="display:none">0</span></a>
  </div>
</nav>

<div class="page">
  <h1 class="page-title">Checkout</h1>
  <div class="checkout-layout">

    <!-- Address form -->
    <div class="checkout-form-card">
      <h3>Delivery Address</h3>
      <form id="checkout-form">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="fullName" required placeholder="Rahul Sharma"/>
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" name="phone" required placeholder="9876543210"/>
          </div>
        </div>
        <div class="form-group">
          <label>Address Line</label>
          <input type="text" name="address" required placeholder="House no., Street, Area"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>City</label>
            <input type="text" name="city" required placeholder="Mumbai"/>
          </div>
          <div class="form-group">
            <label>Pincode</label>
            <input type="text" name="pincode" required placeholder="400001"/>
          </div>
        </div>
        <div class="form-group">
          <label>State</label>
          <select name="state" required>
            <option value="">Select State</option>
            <option>Maharashtra</option><option>Delhi</option><option>Karnataka</option>
            <option>Tamil Nadu</option><option>Uttar Pradesh</option><option>Gujarat</option>
            <option>West Bengal</option><option>Rajasthan</option><option>Other</option>
          </select>
        </div>
        <button type="submit" class="btn-primary btn-block" style="margin-top:1.5rem">
          Place Order ✓
        </button>
      </form>
    </div>

    <!-- Order preview -->
    <div>
      <div class="summary-box">
        <h3>Order Preview</h3>
        <div id="order-preview"></div>
      </div>
    </div>

  </div>
</div>

<footer>© 2025 ShopFire</footer>

<script type="module" src="js/checkout.js"></script>
<script type="module">
  import { updateCartBadge } from "./js/cart.js";
  updateCartBadge();
</script>
</body>
</html>
