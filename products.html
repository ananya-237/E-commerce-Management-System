<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products — ShopFire</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/products.css"/>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">Shop<span>Fire</span></a>
  <div class="nav-links">
    <a href="products.html">Products</a>
    <a href="orders.html">My Orders</a>
  </div>
  <div class="nav-actions">
    <a href="cart.html" class="cart-icon">🛒 <span id="cart-badge" style="display:none">0</span></a>
    <span id="nav-user" style="font-size:.85rem;color:var(--text-muted)"></span>
    <button id="nav-logout-btn" class="btn-outline" style="display:none">Logout</button>
    <a href="auth.html" id="nav-auth-btn" class="btn-primary">Sign In</a>
  </div>
</nav>

<div class="page">
  <h1 class="page-title">All Products</h1>

  <!-- Filters -->
  <div class="filter-bar">
    <button class="filter-chip active" data-cat="">All</button>
    <button class="filter-chip" data-cat="Electronics">Electronics</button>
    <button class="filter-chip" data-cat="Clothing">Clothing</button>
    <button class="filter-chip" data-cat="Books">Books</button>
    <button class="filter-chip" data-cat="Home">Home</button>
    <div class="search-bar">
      <input type="search" id="search-input" placeholder="Search products…"/>
      <span class="search-icon">🔍</span>
    </div>
  </div>

  <!-- Grid -->
  <div class="products-grid" id="products-grid">
    <p class="loading-msg">Loading products…</p>
  </div>
</div>

<footer>© 2025 ShopFire</footer>

<script type="module">
  import { fetchProducts, renderProductCards } from "./js/products.js";
  import { watchAuth } from "./js/auth.js";
  import { logout } from "./js/auth.js";
  import { updateCartBadge } from "./js/cart.js";

  updateCartBadge();
  let allProducts = [];

  watchAuth((user) => {
    const authBtn = document.getElementById("nav-auth-btn");
    const logoutBtn = document.getElementById("nav-logout-btn");
    const userEl = document.getElementById("nav-user");
    if (user) {
      authBtn.style.display = "none";
      logoutBtn.style.display = "inline-flex";
      userEl.textContent = `Hi, ${user.displayName?.split(" ")[0] || "User"}`;
    }
  });
  document.getElementById("nav-logout-btn").addEventListener("click", logout);

  async function load(cat = "") {
    allProducts = await fetchProducts(cat || null);
    renderProductCards(allProducts, "products-grid");
    updateCartBadge();
  }

  load();

  document.querySelectorAll(".filter-chip").forEach(chip => {
    chip.addEventListener("click", () => {
      document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      load(chip.dataset.cat);
    });
  });

  document.getElementById("search-input").addEventListener("input", (e) => {
    const q = e.target.value.toLowerCase();
    const filtered = allProducts.filter(p =>
      p.name.toLowerCase().includes(q) || p.description?.toLowerCase().includes(q)
    );
    renderProductCards(filtered, "products-grid");
  });
</script>
</body>
</html>
